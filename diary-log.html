<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d2c / login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: rgba(255, 255, 255, 0.8);
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gif {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-gif.active {
            opacity: 0.3;
        }

        #content {
            position: relative;
            z-index: 2;
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        a.back {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        a.back:hover {
            color: #fff;
            text-decoration: underline;
        }

        #login-form {
            text-align: center;
            margin-top: 60px;
        }

        #login-form input {
            display: block;
            margin: 10px auto;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 10px 16px;
            width: 260px;
            outline: none;
            letter-spacing: 1px;
        }

        #login-form input:focus {
            border-color: rgba(255, 255, 255, 0.6);
        }

        #login-form button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 10px 30px;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        #login-form button:hover {
            border-color: #fff;
            color: #fff;
        }

        #login-error {
            color: rgba(255, 100, 100, 0.8);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .faith {
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 40px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="content">
        <a class="back" href="/diary">&larr; back to diary</a>
        <h1>login</h1>

        <div id="login-form">
            <input type="text" id="username" placeholder="login" autocomplete="off">
            <input type="password" id="password" placeholder="password">
            <button id="login-btn">enter</button>
            <div id="login-error">неверный логин или пароль</div>
        </div>

        <div class="counter" style="text-align:center;color:rgba(255,255,255,0.15);font-size:10px;letter-spacing:2px;margin-top:30px;">visited today: <span id="counter">--</span></div>
        <div class="faith">faith &mdash; hope &mdash; death</div>
    </div>

    <script src="/site.js"></script>
    <script id="page-script">
        const loginBtn = document.getElementById('login-btn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('login-error');

        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) return;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error('bad');
                localStorage.setItem('diary_token', data.token);
                window.location.href = '/diary';
            } catch (e) {
                loginError.style.display = 'block';
            }
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
