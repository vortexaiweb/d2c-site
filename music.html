<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d2c / music</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gif {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-gif.active {
            opacity: 1;
        }

        #content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
            transition: color 0.3s;
        }

        a:hover {
            color: #fff;
            text-decoration: underline;
        }

        a.back {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        a.back:hover {
            color: #fff;
        }

        .np-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .np-track {
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .np-track:hover {
            color: #fff;
        }

        .np-artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .np-none, .np-error {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .top {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .top .countdown {
            color: rgba(255, 255, 255, 0.3);
        }

        .faith {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .faith .counter {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="top">
        <div class="countdown" id="countdown">--</div>
    </div>

    <div id="content">
        <a class="back" href="/">&larr; back</a>
        <a href="https://soundcloud.com/fuckd2c" target="_blank">soundcloud</a>
        <div class="np-label">[ now playing ]</div>
        <div id="now-playing">
            <div class="np-none">загрузка...</div>
        </div>
    </div>

    <div class="faith">
        <div class="counter">visitors: <span id="counter">--</span></div>
        faith &mdash; hope &mdash; death
    </div>

    <script src="/site.js"></script>
    <script>
        const gifs = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ2E0Y3U4OTg5eWFtZTVmcHhyZm5zbDhmYm5odzl5dm04aWh1amQ1ZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o6ZsS9CYscAuuw7Is/giphy.gif",

            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cjRkdWh1bXViOGZ6cXU3djA5Zm8wdmNxYWl0YjU1bXlqcXpud2l6MCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/du2blShdOu5pe/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3andvanVmZm9ldXZlOHVvamd6MXcyZWdvaHNmNHl6cWx6bzdrNzQwaCZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/l46Cvwo9PphGJjico/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTFvbmw3dHUxZnQweW91c2d1Z3EyZDVhM2xpM285MmN0ZzIzYm9hYiZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/smPCYHPfEfRfy/giphy.gif",

            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcG14M3gxbTViZmoxMDhnanJxYzJtcHRibGxlbHk0dGJiaTFlZnlpNCZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/l2JIhq7AR3J7Qq9Hy/giphy.gif",

            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWxoeHl2b3dyY3E5cm9sdjJ3b2xlczNtcXV3Mnp0NG5uYXVoemo3ayZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/M69bHillPDcpG/giphy.gif",

            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cHl1aWt1M2N0NjZqYzBid25kM3pscHJibmhjaWtseDF2dDl4Njd2cyZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/jBy5Rdrw0nmFO/giphy.gif"
        ];

        (function() {
            const container = document.getElementById('bg-container');
            let currentIndex = 0;

            gifs.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'bg-gif';
                if (index === 0) img.classList.add('active');
                container.appendChild(img);
            });

            const images = document.querySelectorAll('.bg-gif');
            setInterval(() => {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
            }, 4000);
        })();

        const LASTFM_USER = 'd2cfellinluv';
        const LASTFM_API_KEY = 'ee56b7cd5dfe69f5fde6241f74e08824';

        const npDiv = document.getElementById('now-playing');

        async function fetchNowPlaying() {
            try {
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.getRecentTracks&user=${LASTFM_USER}&api_key=${LASTFM_API_KEY}&format=json&limit=1`;
                const res = await fetch(url);
                const data = await res.json();
                const track = data?.recenttracks?.track?.[0];
                if (!track) {
                    npDiv.innerHTML = `<div class="np-none">ничего не играет</div>`;
                    return;
                }
                const nowPlaying = track['@attr']?.nowplaying === 'true';
                if (nowPlaying) {
                    npDiv.innerHTML = `
                        <div class="np-track">${escapeHtml(track.name)}</div>
                        <div class="np-artist">${escapeHtml(track.artist['#text'])}</div>`;
                } else {
                    npDiv.innerHTML = `
                        <div class="np-track">${escapeHtml(track.name)}</div>
                        <div class="np-artist">${escapeHtml(track.artist['#text'])}</div>`;
                }
            } catch {
                npDiv.innerHTML = `<div class="np-error">не удалось загрузить</div>`;
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        fetchNowPlaying();
        setInterval(fetchNowPlaying, 15000);
    </script>
</body>
</html>
