<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d2c / diary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: rgba(255, 255, 255, 0.8);
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gif {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-gif.active {
            opacity: 0.3;
        }

        #content {
            position: relative;
            z-index: 2;
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        a.back {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        a.back:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* New post */
        #new-post-form {
            display: none;
            margin-bottom: 40px;
        }

        #new-post-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 12px;
            min-height: 100px;
            resize: vertical;
            outline: none;
            letter-spacing: 1px;
        }

        #new-post-form textarea:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        #new-post-form button {
            display: block;
            margin: 10px 0 0 auto;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 8px 24px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        #new-post-form button:hover {
            border-color: #fff;
            color: #fff;
        }

        /* Posts */
        #posts {
            display: block;
        }

        .post {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.4);
        }

        .post .date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .post .text {
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 100, 100, 0.4);
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .post .delete-btn:hover {
            color: rgba(255, 100, 100, 0.8);
        }

        #logout-btn {
            display: none;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 6px 16px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        #logout-btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .no-posts {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .faith {
            cursor: pointer;
            user-select: none;
        }

        .click-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .faith {
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 40px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="content">
        <a class="back" href="/">&larr; back</a>
        <h1>diary</h1>

        <button id="logout-btn">logout</button>

        <div class="click-hint" id="click-hint"></div>

        <div id="new-post-form">
            <textarea id="post-text" placeholder="что у тебя нового?..."></textarea>
            <button id="submit-post">написать</button>
        </div>

        <div id="posts">
            <div id="posts-list"></div>
        </div>

        <div class="faith" id="faith-click">faith &mdash; hope &mdash; death</div>
    </div>

    <script>
        let faithClicks = 0;
        const faithEl = document.getElementById('faith-click');
        const hintEl = document.getElementById('click-hint');
        if (faithEl) {
            faithEl.addEventListener('click', () => {
                faithClicks++;
                const remaining = 5 - faithClicks;
                if (remaining > 0 && remaining <= 3) {
                    hintEl.textContent = '·'.repeat(remaining);
                }
                if (faithClicks >= 5) {
                    window.location.href = '/diary/log';
                }
            });
        }

        const gifs = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ2E0Y3U4OTg5eWFtZTVmcHhyZm5zbDhmYm5odzl5dm04aWh1amQ1ZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o6ZsS9CYscAuuw7Is/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MTA0dXRsdm1naW56aHcwYjh3bGhlbGxpcHhyZTl2bXkxeWllenJwdSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/2vs8rSilWauHJUqM5l/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cW8wdXB4NDZzNzExaXlwd25yaTBjZnZ2djU4eDBzenZtcDh4YWtqeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/LWH5axJkuS0ZdO0Upl/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3NzY3Y2drYWd5Y3EzMGxrYXY1eWVwazR3am02Y3Jjejc1eTQyMWFjaCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3og0Iw1jlHwfl9Q5MY/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3eGNyN2s1YWJrOGNob213bnloc25oNHA2a25pbmw3M29wMmc2cnFleSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/adJkQdRCsyAVdGQdF6/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cW8wdXB4NDZzNzExaXlwd25yaTBjZnZ2djU4eDBzenZtcDh4YWtqeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/LWH5axJkuS0ZdO0Upl/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cjRkdWh1bXViOGZ6cXU3djA5Zm8wdmNxYWl0YjU1bXlqcXpud2l6MCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/du2blShdOu5pe/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3andvanVmZm9ldXZlOHVvamd6MXcyZWdvaHNmNHl6cWx6bzdrNzQwaCZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/l46Cvwo9PphGJjico/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTFvbmw3dHUxZnQweW91c2d1Z3EyZDVhM2xpM285MmN0ZzIzYm9hYiZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/smPCYHPfEfRfy/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3M3BlZ2tuYXQ1N3Nsa2hmczd0cDdvOTg5aHZ1ejg1Mm93bWMwM2RsZyZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/26n6OuU2HDUNQzFV6/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcG14M3gxbTViZmoxMDhnanJxYzJtcHRibGxlbHk0dGJiaTFlZnlpNCZlcD12MV9naWZzX3RyZW5kaW5nJmN0PWc/l2JIhq7AR3J7Qq9Hy/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaGJzMjlvM3NmNDN6NXNhdTB1aG9heWZ0MGpwMXo0ZXIzOGR0ZTJmMCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/VXluml3lugeIw/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWxoeHl2b3dyY3E5cm9sdjJ3b2xlczNtcXV3Mnp0NG5uYXVoemo3ayZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/M69bHillPDcpG/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWxoeHl2b3dyY3E5cm9sdjJ3b2xlczNtcXV3Mnp0NG5uYXVoemo3ayZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/3o7bucSgnyC9KUJbOw/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cHl1aWt1M2N0NjZqYzBid25kM3pscHJibmhjaWtseDF2dDl4Njd2cyZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/jBy5Rdrw0nmFO/giphy.gif"
        ];

        (function() {
            const container = document.getElementById('bg-container');
            let currentIndex = 0;

            gifs.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'bg-gif';
                if (index === 0) img.classList.add('active');
                container.appendChild(img);
            });

            const images = document.querySelectorAll('.bg-gif');
            setInterval(() => {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
            }, 4000);
        })();

        let token = localStorage.getItem('diary_token');

        const loginPrompt = document.getElementById('login-prompt');
        const loginLink = document.getElementById('login-link');
        const logoutBtn = document.getElementById('logout-btn');
        const newPostForm = document.getElementById('new-post-form');
        const postText = document.getElementById('post-text');
        const submitPost = document.getElementById('submit-post');
        const postsList = document.getElementById('posts-list');

        async function api(path, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(path, { ...options, headers });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'error');
            return data;
        }

        async function loadPosts() {
            try {
                const data = await api('/api/posts');
                postsList.innerHTML = '';
                if (data.posts.length === 0) {
                    postsList.innerHTML = '<div class="no-posts">пока нет записей</div>';
                } else {
                    data.posts.forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'post';
                        const date = new Date(post.created_at);
                        const dateStr = date.toLocaleString('ru-RU', {
                            day: 'numeric', month: 'long', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                        div.innerHTML = `
                            <div class="date">${dateStr}</div>
                            <div class="text">${escapeHtml(post.text)}</div>
                        `;
                        if (token) {
                            const delBtn = document.createElement('button');
                            delBtn.className = 'delete-btn';
                            delBtn.textContent = '[ удалить ]';
                            delBtn.onclick = async () => {
                                if (confirm('удалить запись?')) {
                                    await api('/api/posts/' + post.id, { method: 'DELETE' });
                                    await loadPosts();
                                }
                            };
                            div.appendChild(delBtn);
                        }
                        postsList.appendChild(div);
                    });
                }
            } catch (e) {
                postsList.innerHTML = '<div class="no-posts">ошибка загрузки</div>';
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showLoggedIn() {
            loginPrompt.style.display = 'none';
            logoutBtn.style.display = 'block';
            newPostForm.style.display = 'block';
            loadPosts();
        }

        function showLoggedOut() {
            loginPrompt.style.display = 'block';
            logoutBtn.style.display = 'none';
            newPostForm.style.display = 'none';
            token = null;
            localStorage.removeItem('diary_token');
            loadPosts();
        }

        if (token) {
            api('/api/me').then(() => showLoggedIn()).catch(() => showLoggedOut());
        }

        logoutBtn.addEventListener('click', () => {
            showLoggedOut();
        });

        submitPost.addEventListener('click', async () => {
            const text = postText.value.trim();
            if (!text) return;
            try {
                await api('/api/posts', {
                    method: 'POST',
                    body: JSON.stringify({ text })
                });
                postText.value = '';
                await loadPosts();
            } catch (e) {
                alert('ошибка при сохранении');
            }
        });

        postText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) submitPost.click();
        });

        loadPosts();
    </script>
</body>
</html>
