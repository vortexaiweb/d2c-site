<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d2c / diary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: rgba(255, 255, 255, 0.8);
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gif {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-gif.active {
            opacity: 0.3;
        }

        #content {
            position: relative;
            z-index: 2;
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        a.back {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        a.back:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* New post */
        #new-post-form {
            display: none;
            margin-bottom: 40px;
        }

        #new-post-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 12px;
            min-height: 100px;
            resize: vertical;
            outline: none;
            letter-spacing: 1px;
        }

        #new-post-form textarea:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        #new-post-form button {
            display: block;
            margin: 10px 0 0 auto;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 8px 24px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        #new-post-form button:hover {
            border-color: #fff;
            color: #fff;
        }

        /* Posts */
        #posts {
            display: block;
        }

        .post {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.4);
        }

        .post .date {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .post .text {
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 100, 100, 0.4);
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .post .delete-btn:hover {
            color: rgba(255, 100, 100, 0.8);
        }

        #logout-btn {
            display: none;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            padding: 6px 16px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        #logout-btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .no-posts {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .click-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .faith {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
            cursor: pointer;
            user-select: none;
        }

        .faith .counter {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div id="content">
        <a class="back" href="/">&larr; back</a>
        <h1>diary</h1>

        <button id="logout-btn">logout</button>

        <div class="click-hint" id="click-hint"></div>

        <div id="new-post-form">
            <textarea id="post-text" placeholder="что у тебя нового?..."></textarea>
            <button id="submit-post">написать</button>
        </div>

        <div id="posts">
            <div id="posts-list"></div>
        </div>

        <script src="/site.js"></script>
        <script id="page-script">
        let faithClicks = 0;
        const faithEl = document.getElementById('faith-click');
        const hintEl = document.getElementById('click-hint');
        if (faithEl) {
            faithEl.addEventListener('click', () => {
                faithClicks++;
                const remaining = 5 - faithClicks;
                if (remaining > 0 && remaining <= 3) {
                    hintEl.textContent = '·'.repeat(remaining);
                }
                if (faithClicks >= 5) {
                    window.location.href = '/diary/log';
                }
            });
        }

        let token = localStorage.getItem('diary_token');

        const logoutBtn = document.getElementById('logout-btn');
        const newPostForm = document.getElementById('new-post-form');
        const postText = document.getElementById('post-text');
        const submitPost = document.getElementById('submit-post');
        const postsList = document.getElementById('posts-list');

        async function api(path, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(path, { ...options, headers });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'error');
            return data;
        }

        async function loadPosts() {
            try {
                const data = await api('/api/posts');
                postsList.innerHTML = '';
                if (data.posts.length === 0) {
                    postsList.innerHTML = '<div class="no-posts">пока нет записей</div>';
                } else {
                    data.posts.forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'post';
                        const date = new Date(post.created_at);
                        const dateStr = date.toLocaleString('ru-RU', {
                            day: 'numeric', month: 'long', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                        div.innerHTML = `
                            <div class="date">${dateStr}</div>
                            <div class="text">${escapeHtml(post.text)}</div>
                        `;
                        if (token) {
                            const delBtn = document.createElement('button');
                            delBtn.className = 'delete-btn';
                            delBtn.textContent = '[ удалить ]';
                            delBtn.onclick = async () => {
                                if (confirm('удалить запись?')) {
                                    await api('/api/posts/' + post.id, { method: 'DELETE' });
                                    await loadPosts();
                                }
                            };
                            div.appendChild(delBtn);
                        }
                        postsList.appendChild(div);
                    });
                }
            } catch (e) {
                postsList.innerHTML = '<div class="no-posts">ошибка загрузки</div>';
            }
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function showLoggedIn() {
            hintEl.style.display = 'none';
            logoutBtn.style.display = 'block';
            newPostForm.style.display = 'block';
            loadPosts();
        }

        function showLoggedOut() {
            hintEl.style.display = 'block';
            logoutBtn.style.display = 'none';
            newPostForm.style.display = 'none';
            token = null;
            localStorage.removeItem('diary_token');
            loadPosts();
        }

        if (token) {
            api('/api/me').then(() => showLoggedIn()).catch(() => showLoggedOut());
        }

        logoutBtn.addEventListener('click', () => {
            showLoggedOut();
        });

        submitPost.addEventListener('click', async () => {
            const text = postText.value.trim();
            if (!text) return;
            try {
                await api('/api/posts', {
                    method: 'POST',
                    body: JSON.stringify({ text })
                });
                postText.value = '';
                await loadPosts();
            } catch (e) {
                alert('ошибка при сохранении');
            }
        });

        postText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) submitPost.click();
        });

        loadPosts();
    </script>
</div>

<div class="faith" id="faith-click">
    <div class="counter">visited today: <span id="counter">--</span></div>
    faith &mdash; hope &mdash; death
</div>

</body>
</html>
