<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d2c</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gif {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-gif.active {
            opacity: 1;
        }

        #content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
            transition: color 0.3s;
        }

        a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .top {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .top .countdown {
            color: rgba(255, 255, 255, 0.3);
        }

        .faith {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        .faith .counter {
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="top">
        <div class="countdown" id="countdown">--</div>
    </div>

    <div id="content">
        <a href="/me">me</a>
        <a href="/diary">diary</a>
        <a href="/music">music</a>
    </div>

    <div class="faith">
        <div class="counter">visited today: <span id="counter">--</span></div>
        faith &mdash; hope &mdash; death
    </div>

    <script src="/site.js"></script>
</body>
</html>
